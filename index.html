

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error404 · Digital Solutions</title>
  <!-- Font & mild style reset -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #fafafa;
      color: #2b3a4a;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    :root {
      --bg-light: #f9fcff;
      --primary-mild: #5b7a9a;
      --primary-soft: #7a9bbf;
      --accent-pulse: #8ab3cf;
      --card-bg: #ffffffd9;
      --border-soft: #e4edf5;
      --text-dark: #2e445b;
      --text-soft: #4d6278;
      --orange-brand: #d97c4a;
      --orange-light: #f5e3d9;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* header */
    header {
      padding: 1.5rem 0 0.8rem 0;
      background: transparent;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 60px;
      padding: 0.8rem 2rem;
      box-shadow: 0 12px 28px -8px rgba(45, 62, 80, 0.08);
      border: 1px solid var(--border-soft);
    }

    /* custom logo image (replaces previous text logo) */
    .logo-link {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .logo-img {
      height: 52px;          /* fits nicely in header */
      width: auto;
      display: block;
      transition: transform 0.2s ease;
    }
    .logo-img:hover {
      transform: scale(1.02);
      filter: drop-shadow(0 4px 10px rgba(217,124,74,0.15));
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 500;
      color: var(--text-dark);
      padding: 0.5rem 0.2rem;
      transition: all 0.25s ease;
      border-radius: 30px;
      display: inline-block;
      background: transparent;
      cursor: pointer;
    }

    .nav-links a:hover {
      color: var(--orange-brand);
      animation: pulseGlow 1.8s infinite ease-in-out;
      background-color: rgba(217, 124, 74, 0.08);
      padding: 0.5rem 1.2rem;
      margin: -0.5rem -0.5rem;
      transform: scale(1.02);
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(217, 124, 74, 0.2); }
      50% { box-shadow: 0 0 0 10px rgba(217, 124, 74, 0.0); }
      100% { box-shadow: 0 0 0 0 rgba(217, 124, 74, 0.2); }
    }

    /* hero */
    .hero {
      padding: 3rem 0 0.5rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 3.3rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text-dark);
      line-height: 1.2;
      max-width: 900px;
    }

    .hero h1 .orange-highlight {
      color: var(--orange-brand);
      font-weight: 600;
    }

    .hero p {
      font-size: 1.3rem;
      color: var(--text-soft);
      margin-top: 1.2rem;
      max-width: 700px;
      font-weight: 300;
    }

    .hero-decoration {
      width: 180px;
      height: 180px;
      background: radial-gradient(circle at 30% 30%, rgba(217,124,74,0.1) 0%, transparent 70%);
      border-radius: 50%;
      margin: 1rem auto 0.2rem;
      filter: blur(40px);
      animation: float 10s infinite alternate ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: 0.4; }
      100% { transform: translateY(-25px) scale(1.1); opacity: 0.8; }
    }

    /* core capabilities title */
    .section-title {
      font-size: 2.5rem;
      font-weight: 400;
      color: var(--text-dark);
      text-align: center;
      margin: 0.5rem 0 2rem;
    }
    .section-title span {
      font-weight: 500;
      border-bottom: 2px solid var(--orange-brand);
      padding-bottom: 0.3rem;
    }

    /* service cards grid (clickable panels) */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 2rem;
      margin: 1.5rem 0 3rem;
    }
    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.2s ease;
    }
    .card-link:hover {
      transform: translateY(-6px);
    }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border-soft);
      border-radius: 32px;
      padding: 2.2rem 1.8rem;
      box-shadow: 0 12px 28px -8px rgba(45, 62, 80, 0.08);
      transition: all 0.35s cubic-bezier(0.05, 0.5, 0.2, 1);
      text-align: left;
      height: 100%;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-10px) scale(1.01);
      box-shadow: 0 24px 40px -12px rgba(217, 124, 74, 0.25);
      border-color: var(--orange-brand);
      animation: cardPulse 2s infinite;
    }
    @keyframes cardPulse {
      0% { box-shadow: 0 24px 40px -12px rgba(217, 124, 74, 0.2); }
      50% { box-shadow: 0 28px 48px -8px rgba(217, 124, 74, 0.35); }
      100% { box-shadow: 0 24px 40px -12px rgba(217, 124, 74, 0.2); }
    }
    .card-icon {
      font-size: 2.8rem;
      margin-bottom: 1.3rem;
      opacity: 0.9;
    }
    .card h3 {
      font-size: 1.7rem;
      font-weight: 500;
      color: var(--primary-mild);
      margin-bottom: 0.75rem;
    }
    .card p {
      color: var(--text-soft);
      font-weight: 400;
      font-size: 1rem;
    }

    /* section styling for each service */
    .service-section {
      padding: 4rem 0;
      border-bottom: 1px solid var(--border-soft);
      scroll-margin-top: 5rem;
    }
    .service-section:last-of-type {
      border-bottom: none;
    }
    .service-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
    }
    .service-content h2 {
      font-size: 2.5rem;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 1.5rem;
    }
    .service-content h2 .orange-accent {
      color: var(--orange-brand);
    }
    .service-content p {
      color: var(--text-soft);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .service-content .cta-link {
      display: inline-block;
      background: var(--orange-brand);
      color: white;
      padding: 0.9rem 2.5rem;
      border-radius: 60px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
      border: 1px solid transparent;
    }
    .service-content .cta-link:hover {
      background: #c46a3b;
      transform: scale(1.02);
      box-shadow: 0 12px 24px -8px rgba(217,124,74,0.4);
    }
    .service-image img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 32px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-soft);
      transition: transform 0.4s;
    }
    .service-image img:hover {
      transform: scale(1.01);
      border-color: var(--orange-brand);
    }
    @media (max-width: 800px) {
      .service-grid { grid-template-columns: 1fr; }
    }

    /* contact section specific */
    .contact-details {
      background: #f0f5fa;
      padding: 2rem;
      border-radius: 32px;
      margin-top: 1rem;
    }

    /* photo grid (stock) */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.8rem;
      margin: 3rem 0 2rem;
    }
    .photo-card {
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 28px -8px rgba(45, 62, 80, 0.08);
      border: 1px solid var(--border-soft);
      transition: transform 0.3s ease, box-shadow 0.3s;
    }
    .photo-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 36px -12px rgba(217,124,74,0.2);
      border-color: var(--orange-brand);
    }
    .photo-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background-color: #d1ddeb;
    }
    .photo-caption {
      padding: 1.2rem 1.2rem 1.5rem 1.2rem;
      font-weight: 400;
      color: var(--text-dark);
      background: #ffffffec;
    }
    .photo-caption strong {
      color: var(--orange-brand);
      font-weight: 600;
    }
    .photo-caption p {
      color: var(--text-soft);
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }

    /* footer */
    .footer-soft {
      margin-top: 5rem;
      padding: 2.5rem 0;
      border-top: 1px solid var(--border-soft);
      text-align: center;
      color: var(--text-soft);
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(2px);
    }
    .footer-soft a {
      color: var(--primary-mild);
      text-decoration: none;
      font-weight: 400;
      transition: 0.2s;
    }
    .footer-soft a:hover {
      animation: pulseGlow 1.5s infinite;
      background: rgba(217, 124, 74, 0.08);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      color: var(--orange-brand);
    }
    .pill {
      background: rgba(217, 124, 74, 0.04);
      padding: 0.5rem 1.5rem;
      border-radius: 60px;
      border: 1px solid var(--border-soft);
      font-weight: 300;
      font-size: 1rem;
      transition: 0.2s;
      color: var(--text-soft);
    }
    .pill:hover {
      background: rgba(217, 124, 74, 0.12);
      border-color: var(--orange-brand);
      color: var(--orange-brand);
    }
  </style>
</head>
